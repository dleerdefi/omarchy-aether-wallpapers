# Aether Theme Manager keybindings - add to ~/.config/hypr/bindings.conf
bindd = SUPER SHIFT, S, Save wallpaper to theme, exec, omarchy-launch-walker -m menus:aetherSaveToTheme --width 800 --minheight 400
bindd = SUPER SHIFT ALT, S, Cycle wallpaper, exec, ~/.local/bin/aether-cycle-theme
bindd = SUPER SHIFT, R, Remove wallpaper from theme, exec, omarchy-launch-walker -m menus:aetherRemoveFromTheme --width 800 --minheight 400
bindd = SUPER SHIFT ALT, W, Switch theme, exec, omarchy-launch-walker -m menus:omarchythemes --width 800 --minheight 400
